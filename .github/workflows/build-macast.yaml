name: Build Macast

on:
  push:
    branches:
      - main
      - dev_test
      - morelog
  pull_request:
  workflow_dispatch:
    inputs:
      release:
        description: Publish artifacts to GitHub Releases after a successful build
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHON_VERSION: "3.10"

concurrency:
  group: build-macast-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-linux:
    name: build-linux
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements/common.txt

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext
          python -m pip install --upgrade pip
          python -m pip install -r requirements/common.txt pyinstaller

      - name: Build translations
        run: |
          for file in i18n/*; do
            msgfmt -o "$file/LC_MESSAGES/macast.mo" "$file/LC_MESSAGES/macast.po"
          done

      - name: Build binary and deb
        run: |
          VERSION=$(cat macast/.version)
          DIST_BIN="Macast-Linux-v${VERSION}-amd64"
          DIST_DEB="Macast-Linux-v${VERSION}-amd64.deb"
          echo "DIST_BIN=${DIST_BIN}" >> "${GITHUB_ENV}"
          echo "DIST_DEB=${DIST_DEB}" >> "${GITHUB_ENV}"

          pyinstaller --noconfirm -F -w \
            --additional-hooks-dir=. \
            --add-data="macast/.version:." \
            --add-data="macast/xml/*:macast/xml" \
            --add-data="i18n/zh_CN/LC_MESSAGES/*.mo:i18n/zh_CN/LC_MESSAGES" \
            --add-data="macast/assets/*:macast/assets" \
            --add-data="macast/assets/fonts/*:macast/assets/fonts" \
            --exclude-module=tkinter \
            --distpath=dist-bin \
            Macast.py

          cp dist-bin/Macast "${DIST_BIN}"

          rm -rf pkg
          mkdir -p pkg/DEBIAN pkg/usr/bin pkg/usr/share/applications pkg/usr/share/icons
          cat > pkg/DEBIAN/control <<EOF
          Package: Macast
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: xfangfang
          Description: DLNA Media Renderer
          Depends: mpv
          EOF
          cat > pkg/usr/share/applications/macast.desktop <<EOF
          [Desktop Entry]
          Name=Macast
          Comment=DLNA Media Renderer
          Exec=/usr/bin/macast
          Icon=/usr/share/icons/Macast.png
          Terminal=false
          Type=Application
          Categories=Video
          EOF
          cp dist-bin/Macast pkg/usr/bin/macast
          cp macast/assets/icon.png pkg/usr/share/icons/Macast.png
          dpkg-deb --build pkg "${DIST_DEB}"

      - name: Upload linux binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DIST_BIN }}
          path: ${{ env.DIST_BIN }}
          if-no-files-found: error

      - name: Upload linux deb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DIST_DEB }}
          path: ${{ env.DIST_DEB }}
          if-no-files-found: error

  build-windows:
    name: build-windows
    runs-on: windows-2022
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements/common.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/common.txt pyinstaller
          $client = New-Object System.Net.WebClient
          $client.DownloadFile('https://github.com/xfangfang/Macast/releases/download/v0.1/mpv-0.34.0-x86_64.7z', 'mpv.7z')
          7z x -obin mpv.7z *.exe
          $client.DownloadFile('https://github.com/xfangfang/Macast/releases/download/v0.1/gettext0.21-iconv1.16-static-64.zip', 'gettext.zip')
          7z x -ogettext gettext.zip bin/msgfmt.exe

      - name: Build translations
        shell: pwsh
        run: |
          Get-ChildItem i18n | ForEach-Object {
            gettext/bin/msgfmt.exe -o "$_/LC_MESSAGES/macast.mo" "$_/LC_MESSAGES/macast.po"
          }

      - name: Build executables
        shell: pwsh
        run: |
          $VERSION = Get-Content macast/.version
          "DIST_EXE=Macast-Windows-v${VERSION}.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "DIST_EXE_DEBUG=Macast-Windows-v${VERSION}-debug.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          pyinstaller --noconfirm -F -w --additional-hooks-dir=. --add-data="macast/.version;." --add-data="macast/xml/*;macast/xml" --add-data="i18n/zh_CN/LC_MESSAGES/*.mo;i18n/zh_CN/LC_MESSAGES" --add-data="macast/assets/*;macast/assets" --add-data="macast/assets/fonts/*;macast/assets/fonts" --add-binary="bin/mpv.exe;bin" --icon=macast/assets/icon.ico --distpath=dist-release Macast.py
          Copy-Item dist-release/Macast.exe "Macast-Windows-v${VERSION}.exe"

          pyinstaller --noconfirm -F --additional-hooks-dir=. --add-data="macast/.version;." --add-data="macast/xml/*;macast/xml" --add-data="i18n/zh_CN/LC_MESSAGES/*.mo;i18n/zh_CN/LC_MESSAGES" --add-data="macast/assets/*;macast/assets" --add-data="macast/assets/fonts/*;macast/assets/fonts" --add-binary="bin/mpv.exe;bin" --icon=macast/assets/icon.ico --distpath=dist-debug Macast.py
          Copy-Item dist-debug/Macast.exe "Macast-Windows-v${VERSION}-debug.exe"

      - name: Upload windows release
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DIST_EXE }}
          path: ${{ env.DIST_EXE }}
          if-no-files-found: error

      - name: Upload windows debug
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DIST_EXE_DEBUG }}
          path: ${{ env.DIST_EXE_DEBUG }}
          if-no-files-found: error

  build-macos:
    name: build-macos
    runs-on: macos-15-intel
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements/darwin.txt

      - name: Install dependencies
        run: |
          brew install create-dmg gettext
          echo "$(brew --prefix gettext)/bin" >> "${GITHUB_PATH}"
          python -m pip install --upgrade pip
          python -m pip install -r requirements/darwin.txt py2app
          curl -L https://laboratory.stolendata.net/~djinn/mpv_osx/mpv-latest.tar.gz -o mpv-latest.tar.gz
          mkdir -p bin
          tar --strip-components 2 -C bin -xzvf mpv-latest.tar.gz mpv.app/Contents/MacOS

      - name: Build translations
        run: |
          for file in i18n/*; do
            msgfmt -o "$file/LC_MESSAGES/macast.mo" "$file/LC_MESSAGES/macast.po"
          done

      - name: Build app bundle and dmg
        run: |
          VERSION=$(cat macast/.version)
          DIST_DMG="Macast-MacOS-v${VERSION}.dmg"
          echo "DIST_DMG=${DIST_DMG}" >> "${GITHUB_ENV}"

          python setup_py2app.py py2app --arch=x86_64
          cp -R bin dist/Macast.app/Contents/Resources/

          create-dmg \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "Macast.app" 200 190 \
            --hide-extension "Macast.app" \
            --app-drop-link 600 185 \
            --volname "Macast-v${VERSION} Installer" \
            "${DIST_DMG}" \
            dist/

      - name: Upload macOS dmg
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DIST_DMG }}
          path: ${{ env.DIST_DMG }}
          if-no-files-found: error

  release:
    name: release
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.release)
    needs:
      - build-linux
      - build-windows
      - build-macos
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat macast/.version)
          TAG="v${VERSION}"
          TITLE="Macast ${TAG}"

          ls -lah artifacts

          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG}" artifacts/* --clobber --repo "${GITHUB_REPOSITORY}"
            gh release edit "${TAG}" --title "${TITLE}" --notes "This release is built by GitHub Actions." --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${TAG}" artifacts/* \
              --title "${TITLE}" \
              --notes "This release is built by GitHub Actions." \
              --repo "${GITHUB_REPOSITORY}"
          fi
